<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challenges — EcoHero</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <a href="index.html" class="sidebar-logo">
                <i class="fas fa-seedling"></i>
                <span>EcoHero</span>
            </a>
            
            <nav class="nav-menu">
                <a href="index.html" class="nav-item">
                    <i class="fas fa-th-large"></i>
                    <span>Dashboard</span>
                </a>
                <a href="challenges.html" class="nav-item active">
                    <i class="fas fa-map-marked-alt"></i>
                    <span>Challenges</span>
                </a>
                <a href="leaderboard.html" class="nav-item">
                    <i class="fas fa-trophy"></i>
                    <span>Leaderboard</span>
                </a>
                <a href="community.html" class="nav-item">
                    <i class="fas fa-users"></i>
                    <span>Community</span>
                </a>
                <a href="how-it-works.html" class="nav-item">
                    <i class="fas fa-info-circle"></i>
                    <span>How It Works</span>
                </a>
                <a href="#" id="logout-btn" class="nav-item" style="margin-top: 20px; color: #ef4444;">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <a href="profile.html" class="user-snippet">
                    <img src="https://ui-avatars.com/api/?name=Aarav&background=14532d&color=fff" id="sidebar-avatar">
                    <div class="user-snippet-info">
                        <h4 id="sidebar-name">Aarav</h4>
                        <p><span id="sidebar-points">1,950</span> pts</p>
                    </div>
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="page-header">
                <div class="page-title">
                    <h1>Active Challenges</h1>
                    <p>Find hotspots near you and start your mission.</p>
                </div>
                <div class="header-actions">
                    <button class="btn btn-primary" onclick="toggleModal('report-modal', true)">
                        <i class="fas fa-bullhorn"></i> Report New Area
                    </button>
                </div>
            </header>

            <div class="dashboard-section">
                <div class="card" id="map" style="height: 300px; margin-bottom: 30px; z-index: 1;"></div>
                <div class="grid-layout" id="challenges-grid">
                    <!-- Populated by JS -->
                </div>
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div id="report-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Report Polluted Area</h2>
                <button class="close-modal" onclick="toggleModal('report-modal', false)">&times;</button>
            </div>
            <form id="challenge-form">
                <div class="form-group">
                    <label>Task Title</label>
                    <input type="text" id="task-name-input" class="form-control" placeholder="e.g. Plastic at Sunset Beach" required>
                </div>
                <div class="form-group">
                    <label>Location</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="task-location-input" class="form-control" placeholder="City or GPS coords" required>
                        <button type="button" class="btn btn-outline" style="padding: 10px;" onclick="detectLocation('task-location-input')"><i class="fas fa-location-arrow"></i></button>
                    </div>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="task-desc-input" class="form-control" placeholder="Describe the situation..." rows="3"></textarea>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Create Challenge</button>
            </form>
        </div>
    </div>

    <div id="complete-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Complete Cleanup</h2>
                <button class="close-modal" onclick="toggleModal('complete-modal', false)">&times;</button>
            </div>
            <form id="complete-form">
                <div class="form-group">
                    <label>Upload After Photo (Geo-Tag Required)</label>
                    <p style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 10px;">Our AI verifies the location matches the reported area.</p>
                    <input type="file" id="after-photo-input" class="form-control" accept="image/*" onchange="previewImage(this, 'after-preview')" required>
                    <img id="after-preview" style="width: 100%; border-radius: 10px; margin-top: 10px; display: none;">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Verify & Claim Points</button>
            </form>
        </div>
    </div>

    <!-- Mobile Bottom Navigation -->
    <nav class="mobile-nav">
        <a href="index.html" class="mobile-nav-item">
            <i class="fas fa-th-large"></i>
            <span>Dash</span>
        </a>
        <a href="challenges.html" class="mobile-nav-item active">
            <i class="fas fa-map-marked-alt"></i>
            <span>Map</span>
        </a>
        <a href="community.html" class="mobile-nav-item">
            <i class="fas fa-users"></i>
            <span>Groups</span>
        </a>
        <a href="profile.html" class="mobile-nav-item">
            <i class="fas fa-user-circle"></i>
            <span>Profile</span>
        </a>
    </nav>

    <script src="script.js"></script>
</body>
</html>
